# Static FAQ Configuration for CustomAI Kazakhstan (Кеден Көмекшісі)
# Each category contains a list of entries with 'keywords' (lowercase stripped triggers) and 'response'.
# Entries are checked in order — place specific/rare keywords BEFORE broad/generic ones.

general:
  # Specific: must come before the broad "сбор за" entry
  - keywords: [утильсбор, утилизационный сбор, кәдеге жарату алымы, утильалым, кәдеге жарату]
    response: "Утилизационный сбор взимается при импорте транспортных средств, сельскохозяйственной техники и определенных видов упаковки в РК. Размер утильсбора зависит от категории транспортного средства, объема двигателя и рассчитывается на основе МРП."

  - keywords: [троис, троиса, реестр товарных знаков, интеллектуальная собственность, тауар белгілері, зияткерлік меншік]
    response: "ТРОИС (ЗТМБР) — это Таможенный реестр объектов интеллектуальной собственности КГД РК. Если товарный знак внесен в ТРОИС, для его импорта требуется официальное письменное разрешение (доверенность) от правообладателя или авторизованного дистрибьютора."

  - keywords: [лимит, беспошлинный лимит, посылка лимит, лимит посылки, без пошлины, бажсыз лимит, сәлемдеме лимиті, бажсыз]
    response: "Для физических лиц лимит беспошлинного ввоза товаров для личного пользования составляет:\n1. Для посылок (МПО): стоимость до 1000 евро и вес до 31 кг.\n2. Для наземного багажа: стоимость до 500 евро и вес до 25 кг.\nПри превышении лимита уплачивается пошлина в размере 15% от суммы превышения, но не менее 2 евро за кг."

  # Broad: must come LAST so specific keywords above are checked first
  - keywords: [таможенный сбор, сколько сбор, сбор за, пошлина за оформление, таможенный платеж, кедендік алым, кеден алымы, кедендік төлем, баж алымы, алым]
    response: "Фиксированный таможенный сбор за таможенное декларирование в Республике Казахстан составляет 20 000 тенге за каждую декларацию (согласно действующему законодательству РК)."