
services:
  # 0. PostgreSQL Relational Database
  postgres:
    image: postgres:16
    container_name: smartkeden-postgres
    restart: always
    environment:
      POSTGRES_DB: smartkeden
      POSTGRES_USER: smartkeden
      POSTGRES_PASSWORD: smartkeden
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartkeden-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartkeden -d smartkeden"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 1. Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.18.1
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - smartkeden-network
    deploy:
      resources:
        limits:
          memory: 4G

  # 2. Backend Service (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: smartkeden-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATABASE_URL=postgresql+psycopg://smartkeden:smartkeden@postgres:5432/smartkeden
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - smartkeden-network
    deploy:
      resources:
        limits:
          memory: 4G

  # 3. Frontend Service (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: smartkeden-frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
      - BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - smartkeden-network
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  qdrant_data:
  postgres_data:

networks:
  smartkeden-network:
    name: smartkeden-network
    driver: bridge
